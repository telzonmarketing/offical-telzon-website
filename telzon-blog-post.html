<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gr:#06C167;--grb:rgba(6,193,103,.12);--grr:rgba(6,193,103,.3);--rp:999px;--t:.2s ease}
body{font-family:'Inter',sans-serif;background:#000;color:#fff;min-height:100vh}
a{color:inherit;text-decoration:none}

/* NAV */
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 5vw;height:64px;background:rgba(0,0,0,.92);backdrop-filter:blur(20px);border-bottom:1px solid #111}
.nav-logo{display:flex;align-items:center;gap:6px}
.wordmark{font-size:18px;font-weight:900;letter-spacing:-0.5px}
.wordmark span{color:var(--gr)}
.sub{font-size:9px;font-weight:700;color:#555;letter-spacing:.1em;text-transform:uppercase;margin-top:1px}
.nav-links{display:flex;align-items:center;gap:24px}
.nav-links a{font-size:13px;font-weight:500;color:#888;transition:color var(--t)}
.nav-links a:hover{color:#fff}
.nav-cta{background:var(--gr)!important;color:#000!important;font-weight:700!important;padding:8px 18px;border-radius:var(--rp)}

/* PROGRESS BAR */
.progress-bar{position:fixed;top:0;left:0;height:3px;background:var(--gr);z-index:999;transition:width .1s linear;width:0%}

/* HERO */
.post-hero{padding:60px 5vw 40px;max-width:800px;margin:0 auto}
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:12px;color:#555;margin-bottom:28px}
.breadcrumb a{color:#555;transition:color var(--t)}
.breadcrumb a:hover{color:var(--gr)}
.post-cat-pill{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;background:var(--grb);border:1px solid var(--grr);color:var(--gr);padding:4px 12px;border-radius:var(--rp);margin-bottom:20px}
.post-title{font-size:clamp(26px,5vw,48px);font-weight:900;letter-spacing:-1.5px;line-height:1.1;margin-bottom:20px}
.post-meta{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:36px}
.meta-av{width:32px;height:32px;border-radius:50%;background:var(--gr);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#000}
.meta-name{font-size:13px;font-weight:600}
.meta-dot{color:#555;font-size:10px}
.meta-info{font-size:12px;color:#888}
.post-summary{font-size:16px;color:#aaa;line-height:1.7;padding:24px;background:#111;border-left:3px solid var(--gr);border-radius:0 12px 12px 0;margin-bottom:40px}

/* POST IMAGE */
.post-img{width:100%;max-width:800px;margin:0 auto 40px;border-radius:16px;overflow:hidden;background:linear-gradient(135deg,#0a1a0f,#061209);min-height:300px;display:flex;align-items:center;justify-content:center}
.post-img img{width:100%;height:100%;object-fit:cover}
.post-img-placeholder{font-size:11px;font-weight:900;color:var(--gr);letter-spacing:.1em;opacity:.4}

/* POST BODY */
.post-body{max-width:800px;margin:0 auto;padding:0 5vw 80px;font-size:16px;line-height:1.8;color:#ccc}
.post-body h1,.post-body h2{font-size:24px;font-weight:800;color:#fff;margin:40px 0 16px;letter-spacing:-.5px}
.post-body h3{font-size:19px;font-weight:700;color:#fff;margin:32px 0 12px}
.post-body h4{font-size:16px;font-weight:700;color:#bbb;margin:24px 0 10px}
.post-body p{margin-bottom:20px}
.post-body ul,.post-body ol{padding-left:24px;margin-bottom:20px}
.post-body li{margin-bottom:8px}
.post-body strong{color:#fff;font-weight:700}
.post-body a{color:var(--gr);text-decoration:underline;text-underline-offset:3px}
.post-body blockquote{border-left:3px solid var(--gr);padding:16px 20px;background:#0a0a0a;border-radius:0 10px 10px 0;margin:24px 0;font-style:italic;color:#aaa}
.post-body code{background:#1a1a1a;border:1px solid #252525;border-radius:6px;padding:2px 8px;font-size:13px;color:var(--gr);font-family:monospace}
.post-body pre{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:12px;padding:20px;overflow-x:auto;margin:20px 0}
.post-body hr{border:none;border-top:1px solid #1a1a1a;margin:40px 0}

/* TAGS */
.post-tags{display:flex;flex-wrap:wrap;gap:8px;margin:40px 0;padding-top:32px;border-top:1px solid #1a1a1a}
.post-tag{font-size:11px;font-weight:700;background:#111;border:1px solid #1a1a1a;border-radius:var(--rp);padding:5px 14px;color:#888}

/* CTA */
.post-cta{background:linear-gradient(135deg,#0a1a0f,#061209);border:1px solid var(--grr);border-radius:24px;padding:40px;text-align:center;margin:0 5vw 80px;max-width:760px;margin-left:auto;margin-right:auto}
.post-cta h3{font-size:22px;font-weight:800;margin-bottom:10px}
.post-cta p{font-size:14px;color:#888;margin-bottom:24px}
.btn-primary{display:inline-flex;align-items:center;gap:8px;background:var(--gr);color:#000;font-weight:800;font-size:14px;padding:14px 28px;border-radius:var(--rp);transition:opacity var(--t)}
.btn-primary:hover{opacity:.9}

/* LOADING / ERROR */
.post-loading{min-height:60vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;color:#555}
.spinner{width:32px;height:32px;border:3px solid #1a1a1a;border-top-color:var(--gr);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* WA FLOAT */
.wa-float{position:fixed;bottom:24px;right:24px;width:54px;height:54px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:200;box-shadow:0 4px 20px rgba(37,211,102,.35);transition:transform var(--t)}
.wa-float:hover{transform:scale(1.08)}

@media(max-width:640px){
  .nav-links{display:none}
  .post-hero{padding:40px 5vw 24px}
  .post-title{font-size:26px}
}

/* text-badge normalization (emoji replacement) */
.cicon,.bento-icon,.card-icon,.tk-icon,.tool-icon,.pain-icon,.ai-card-icon,.ind-icon,.blog-card-icon,.service-icon,.contact-icon,.gcta-icon{font-size:11px!important;font-weight:900!important;letter-spacing:.4px!important;color:var(--gr)!important;line-height:1!important}
</style>
</head>
<body>

<div class="progress-bar" id="progress"></div>

    <div class="wordmark">TELZON<span>.</span></div>
    <div class="sub">Marketing</div>
  </a>
  <div class="nav-links">
    <a href="telzon-marketing-website.html#services">Services</a>
    <a href="telzon-marketing-website.html#portfolio">Work</a>
    <a href="telzon-blogs.html" style="color:#fff">Blog</a>

<div id="post-container">
  <div class="post-loading" id="loading">
    <div class="spinner"></div>
    <span>Loading article...</span>
  </div>
</div>

<script>
const POSTS_URL = 'blog-posts.json';

// Reading progress bar
window.addEventListener('scroll', () => {
  const doc = document.documentElement;
  const scrolled = doc.scrollTop / (doc.scrollHeight - doc.clientHeight) * 100;
  document.getElementById('progress').style.width = Math.min(scrolled, 100) + '%';
});

function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function formatDate(iso) {
  return new Date(iso).toLocaleDateString('en-IN', {day: 'numeric', month: 'long', year: 'numeric'});
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function loadPost() {
  const id = getParam('id');
  if (!id) { showError('No post specified.'); return; }

  try {
    const res = await fetch(POSTS_URL + '?v=' + Date.now());
    if (!res.ok) throw new Error('Failed to load posts');
    const posts = await res.json();
    const post = posts.find(p => String(p.id) === String(id));
    if (!post) { showError('Post not found.'); return; }
    if (!post.published) { showError('This post is not published yet.'); return; }
    renderPost(post);
  } catch(e) {
    showError('Could not load the article. Please try again.');
  }
}

function renderPost(post) {
  // Update page meta
  document.title = post.title + ' | TELZON Blog';
  document.querySelector('meta[name="description"]').content = post.summary;

  const container = document.getElementById('post-container');
  const imgSection = post.image
    ? `<div class="post-img" style="max-width:800px;margin:0 auto 40px;padding:0 5vw"><img src="${escHtml(post.image)}" alt="${escHtml(post.title)}" loading="lazy"></div>`
    : '';

  const tagsHtml = (post.tags || []).map(t => `<span class="post-tag">${escHtml(t)}</span>`).join('');

  container.innerHTML = `
    <div class="post-hero">
      <div class="breadcrumb">
        <a href="telzon-marketing-website.html">Home</a>
        <span>›</span>
        <a href="telzon-blogs.html">Blog</a>
        <span>›</span>
        <span style="color:#888">${escHtml(post.category)}</span>
      </div>
      <div class="post-cat-pill">${escHtml(post.category)}</div>
      <h1 class="post-title">${escHtml(post.title)}</h1>
      <div class="post-meta">
        <div class="meta-av">T</div>
        <span class="meta-name">${escHtml(post.author || 'TELZON Team')}</span>
        <span class="meta-dot">·</span>
        <span class="meta-info">${formatDate(post.createdAt)}</span>
        ${post.readTime ? `<span class="meta-dot">·</span><span class="meta-info">${escHtml(post.readTime)} read</span>` : ''}
      </div>
      <div class="post-summary">${escHtml(post.summary)}</div>
    </div>

    ${imgSection}

    <div class="post-body">
      ${post.body || '<p>Full article content coming soon. <a href="telzon-blogs.html">Back to blog →</a></p>'}
      ${tagsHtml ? `<div class="post-tags">${tagsHtml}</div>` : ''}
    </div>

    <div class="post-cta">
      <h3>Want results like this for your business?</h3>
      <p>Book a free strategy call. No commitment — just clarity on how TELZON can grow your brand.</p>
      <a href="https://wa.me/919307189776?text=Hi%20TELZON!%20I%20read%20your%20blog%20and%20want%20to%20discuss%20marketing%20for%20my%20business." class="btn-primary" target="_blank">Book Free Strategy Call →</a>
    </div>
  `;
}

function showError(msg) {
  document.getElementById('post-container').innerHTML = `
    <div class="post-loading">
      <div style="font-size:14px;color:#555">${msg}</div>
      <a href="telzon-blogs.html" style="color:var(--gr);font-size:13px;font-weight:700">← Back to Blog</a>
    </div>
  `;
}

loadPost();
</script>
